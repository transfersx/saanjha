# Netlify deploy config for Saanjha (static Vite + React app).
# Connect this repo in Netlify and these settings are picked up automatically.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — single-page app, route everything to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
